<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
<button type="button"
        class="btn btn-sm"
        style="background:#0077aa;color:#fff;border:none;"
        onclick="snmpIfaceSingleOpen({{ device.pk }}, '{{ device.name|escapejs }}', '{{ interface.name|escapejs }}')"
        title="SNMP Inspector — pobierz dane tego interfejsu">
  <i class="mdi mdi-radar"></i> SNMP
</button>

{% include "netbox_snmp_plugin/snmp_device_button.html" with device=device hide_button=True snmp_device_modal_rendered=False %}

<script>
window.snmpIfaceSingleOpen = function(devId, devName, ifaceName) {
  snmpDeviceOpenModal(devId, devName, true, ifaceName);
};
</script>
